# Renders github metrics into ./metrics.svg on a schedule and commits it back.
# Self-hosted stats via GitHub Actions — no Vercel, no third-party server, and
# (unlike the public github-readme-stats instance) it can count your PRIVATE and
# ORGANIZATION work, because it authenticates with your own token.
#
# One-time setup (only you can do this part):
#   1. Create a classic Personal Access Token:
#      GitHub → Settings → Developer settings → Personal access tokens →
#      Tokens (classic) → Generate new token (classic).
#      Scopes: repo, read:org, read:user   (repo = include private repos;
#      read:org = include organization repos like blizzhackers). No expiry, or
#      set a reminder to rotate it.
#   2. Add it to THIS repo as a secret named METRICS_TOKEN:
#      repo → Settings → Secrets and variables → Actions → New repository secret.
#   3. Push (or run the workflow manually from the Actions tab). The first run
#      generates metrics.svg and commits it; the README embed resolves after that.
#
# Supply-chain note: pinned to an immutable commit SHA (below) rather than the
# moving @latest branch. That SHA is metrics v3.34 — which is also exactly what
# @latest points at today, so this pins the known-good code without downgrading.
# To update later, bump the SHA to a newer reviewed commit.

name: Metrics
on:
  schedule:
    - cron: "0 6 * * *"      # rebuild once a day
  workflow_dispatch:          # allow manual runs from the Actions tab
  push:
    branches: ["main"]

permissions:
  contents: write             # lets the action commit metrics.svg back

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34 — immutable SHA pin (== @latest as of 2026-07)
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: theBGuy
          filename: metrics.svg
          template: classic

          # Restrained by design: the summary header + a languages breakdown,
          # to stay consistent with the rest of the profile.
          base: header

          # Fetch repositories in SMALL pages. metrics' base repository query
          # pulls ~11 costly per-repo connection counts (stargazers, watchers,
          # issues x2, pullRequests x3, releases, deployments, environments) PLUS
          # languages. At the default 100 repos/request, that single GraphQL query
          # trips GitHub's server-side complexity ceiling (RESOURCE_LIMITS_EXCEEDED)
          # once the account has enough repos/PRs/issues — GitHub then returns
          # `user: null`, so metrics silently renders "0 Languages" and a blank
          # "Contributed to N repositories" and commits that empty SVG (the job
          # still reports success). Paginating in pages of 20 keeps each query
          # ~5x under the limit; metrics stitches the pages back together, so no
          # data is lost — just a few extra GraphQL requests (quota is 5000/hr).
          # NOTE: this is a GitHub-side query-cost limit, so a self-hosted or
          # local Docker runner would behave identically — it is not fixable by
          # more RAM. It is also unrelated to the indepth OOM warned about below.
          repositories_batch: 20

          # Most-used languages via GitHub's standard per-repo analysis
          # (lightweight; includes private repos your token can read).
          # DO NOT re-enable plugin_languages_indepth: on an account this size it
          # builds a ~188MB dataset that OOM-crashes the SVG renderer (exit 133).
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          # Hide the header's "Contributed to N repositories" line. That number
          # comes from GitHub's `repositoriesContributedTo` field, which the API
          # now rejects outright for this account (RESOURCE_LIMITS_EXCEEDED) — it
          # fails for EVERY argument variant (includeUserRepositories true/false,
          # first:1, single contributionTypes, privacy:PUBLIC), so metrics renders
          # it blank and no config can bring the real count back. extras_css is
          # injected into the template's <style> (enabled by default in the
          # Action); `!important` overrides metrics' own rules. Selector: the
          # header row is the ONLY `.row`; its second (right) <section> ends with
          # the Contributed-to field, so this hits nothing else.
          extras_css: |
            .row section:last-child .field:last-child { display: none !important; }
